name: Test, Build, and Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  changelog:
    name: Update changelog
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate changelog entry
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if grep -q "^## \[$TAG_NAME\]" CHANGELOG.md; then
            echo "Changelog already contains entry for $TAG_NAME"
            exit 0
          fi

          git fetch --tags --force
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)
          DATE_UTC=$(date -u +"%Y-%m-%d")

          {
            echo "## [$TAG_NAME] - $DATE_UTC"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG_NAME}"
            else
              git log --no-merges --pretty=format:"- %s (%h)" "$TAG_NAME"
            fi
            echo
            echo
          } > /tmp/changelog_entry.md

          awk '1; /<!-- entries -->/ && !x { print ""; while ((getline line < "/tmp/changelog_entry.md") > 0) print line; close("/tmp/changelog_entry.md"); x=1 }' CHANGELOG.md > CHANGELOG.new
          mv CHANGELOG.new CHANGELOG.md

      - name: Commit and push changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${TAG_NAME}"
          git push origin HEAD:main
